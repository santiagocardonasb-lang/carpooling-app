services:
  - type: web
    name: carpool-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false   # Se configura manualmente en el panel de Render
      - key: JWT_SECRET
        sync: false   # Se configura manualmente en el panel de Render
      - key: CORS_ORIGIN
        sync: false   # Se pone la URL de Vercel una vez desplegado el frontend
